<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Timber ACF WP Blocks</title>
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <link rel="stylesheet" href="https://unpkg.com/docsify/lib/themes/dark.css">
        <style>:root
        {
            --accent: #14bbb1;
            --page-bg: #0f1218;
            --sidebar-bg: #151a23;
            --surface: #1a2030;
            --text: #e5ebf5;
            --muted: #a5b2c7;
            --border: #2a3345;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            background: transparent;
            color: var(--text);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 20% -10%, #202a3d 0%, var(--page-bg) 40%);
            pointer-events: none;
        }

        .sidebar {
            background: linear-gradient(180deg, #161d2a 0%, var(--sidebar-bg) 100%);
            border-right: 1px solid var(--border);
        }

        .sidebar-toggle {
            background: var(--sidebar-bg);
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-top-right-radius: 12px;
            box-shadow: none;
        }

        .sidebar-toggle-button {
            padding: 10px 12px;
        }

        .sidebar-toggle span {
            background-color: var(--accent);
        }

        body:not(.close) .sidebar-toggle {
            width: var(--sidebar-width, 300px);
            background: transparent;
            border: 0;
            border-radius: 0;
        }

        body:not(.close) .sidebar-toggle-button {
            background: transparent;
        }

        .markdown-section {
            max-width: 980px;
            color: var(--text);
        }

        .markdown-section a,
        .app-name-link,
        .sidebar-nav a {
            color: var(--accent);
        }

        .search {
            margin: 10px 12px;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border) !important;
            box-shadow: none !important;
        }

        .search::before,
        .search::after {
            display: none !important;
        }

        .search input {
            color: var(--text);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: none !important;
            outline: none !important;
            -webkit-appearance: none;
            appearance: none;
        }

        .search input:focus {
            border-color: var(--border) !important;
            box-shadow: none !important;
            outline: none !important;
        }

        .search input::placeholder {
            color: var(--muted);
        }

        .markdown-section pre {
            background: #16181d;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .markdown-section pre code {
            color: #f4f8ff;
            background: transparent;
            text-shadow: none;
        }

        .markdown-section:not(pre) > code {
            color: #d9f2ff;
            background: rgba(42, 51, 69, 0.6);
            border-radius: 4px;
        }

        .token.comment,
        .token.prolog,
        .token.doctype,
        .token.cdata {
            color: #8ea4c8;
        }

        .token.punctuation {
            color: #e7eefc;
        }

        .token.property,
        .token.tag,
        .token.constant,
        .token.symbol,
        .token.deleted {
            color: #7ee3ff;
        }

        .token.boolean,
        .token.number {
            color: #ffd27a;
        }

        .token.selector,
        .token.attr-name,
        .token.string,
        .token.char,
        .token.builtin,
        .token.inserted {
            color: #9ff7b8;
        }

        .token.operator,
        .token.entity,
        .token.url,
        .language-css .token.string,
        .style .token.string {
            color: #ffb0d9;
            background: transparent;
        }

        .token.atrule,
        .token.attr-value,
        .token.keyword {
            color: #8ec2ff;
        }

        .token.function,
        .token.class-name {
            color: #ffd58f;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        window.$docsify = {
            name: 'Timber ACF WP Blocks',
            repo: 'https://github.com/kevin-terry/timber-acf-wp-blocks',
            themeColor: '#14BBB1',
            loadSidebar: true,
            homepage: 'home.md',
            alias: {
                '/': '/home.md'
            },
            logo: 'timber-acf-blocks-small.png',
            auto2top: true,
            search: {
                depth: 2,
                noData: 'No results found',
                placeholder: 'Search docs...'
            }
        }
    </script>
    <script src="https://unpkg.com/docsify/lib/docsify.min.js"></script>
    <script src="https://unpkg.com/docsify/lib/plugins/search.min.js"></script>
</body></html>
